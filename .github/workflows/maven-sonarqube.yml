name: Maven CI + SonarQube + Auto Issue Assignment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-analyze:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Set up JDK 17 and cache Maven dependencies
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3️⃣ Build project and run SonarQube analysis
    - name: Build + SonarQube analysis
      run: mvn clean verify sonar:sonar \
        -Dsonar.projectKey=my-project \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # 4️⃣ Optional wait for SonarQube to finish processing
    - name: Wait for SonarQube processing
      run: sleep 20

    # 5️⃣ Fetch SonarQube issues and create GitHub issues
    - name: Fetch SonarQube Issues & Create GitHub Issues
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Fetching OPEN vulnerability and bug issues from SonarQube..."
        ISSUES=$(curl -s -u $SONAR_TOKEN: "$SONAR_HOST_URL/api/issues/search?types=VULNERABILITY,BUG&statuses=OPEN")
        echo "$ISSUES" > issues.json

        for row in $(jq -c '.issues[]' issues.json); do
          TITLE=$(echo $row | jq -r '.message')
          FILE=$(echo $row | jq -r '.component')
          SEVERITY=$(echo $row | jq -r '.severity')

          BODY="### 🚨 SonarQube Issue
**File:** $FILE  
**Severity:** $SEVERITY  

**Description:**  
$TITLE"

          # Simple assignment logic (customize per your team)
          ASSIGNEE="your-github-username"

          echo "Creating GitHub issue: $TITLE"

          curl -s -X POST https://api.github.com/repos/${{ github.repository }}/issues \
            -H "Authorization: token $GITHUB_TOKEN" \
            -d "{
              \"title\": \"$TITLE\",
              \"body\": \"$BODY\",
              \"assignees\": [\"$ASSIGNEE\"]
            }"
        done
